<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHer - Signing In...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #FFF8F6;
            color: #6B2D5B;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #FFF0F0;
            border-top-color: #E8636F;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Redirecting back to ConnectHer...</p>
    </div>
    <script>
        // Extract the authorization code from LinkedIn's redirect
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');

        if (code) {
            // Redirect to the iOS app with the auth code
            window.location.href = 'connecther://oauth?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state || '');
        } else if (error) {
            document.querySelector('p').textContent = 'Sign in was cancelled. You can close this page.';
        } else {
            document.querySelector('p').textContent = 'Something went wrong. Please try again.';
        }
    </script>
</body>
</html>
